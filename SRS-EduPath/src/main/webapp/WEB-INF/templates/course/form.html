<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Cập nhật khóa học</title>
</head>
<body>
<section layout:fragment="content">
    <div class="page-heading">
        <div>
            <p class="eyebrow">Admin Action</p>
            <h1>Cập nhật khóa học</h1>
        </div>
    </div>

    <form class="edit-form" th:action="@{/course/update}" th:object="${course}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="read-only">
            <span>Mã khóa</span>
            <strong th:text="*{code}"></strong>
        </div>
        <div class="read-only">
            <span>Tên khóa</span>
            <strong th:text="*{name}"></strong>
        </div>

        <label>
            Học phí
            <input type="number" min="0" step="100000" th:field="*{tuitionFee}" required>
        </label>

        <label>
            Ngày khai giảng
            <input type="date" th:field="*{startDate}" required>
        </label>

        <div class="footer-actions">
            <a class="small-button" th:href="@{/course/list}">Hủy</a>
            <button type="submit">Lưu thay đổi</button>
        </div>
    </form>
</section>
</body>
</html>
