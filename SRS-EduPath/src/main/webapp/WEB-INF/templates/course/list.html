<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Danh sách khóa học</title>
</head>
<body>
<section layout:fragment="content">
    <div class="page-heading">
        <div>
            <p class="eyebrow">Course Catalog</p>
            <h1>Danh sách khóa học</h1>
        </div>
        <a class="text-link" th:href="@{/course/list}">Xóa bộ lọc</a>
    </div>

    <form class="filter-bar" th:action="@{/course/list}" method="get">
        <label>
            Level
            <select name="level">
                <option th:each="levelOption : ${levels}"
                        th:value="${levelOption}"
                        th:text="${levelOption == 'All' ? 'Tất cả' : levelOption}"
                        th:selected="${levelOption == selectedLevel}">
                </option>
            </select>
        </label>
        <label>
            Học phí tối đa
            <input type="number" name="maxFee" min="0" step="100000" placeholder="VD: 6000000" th:value="${maxFee}">
        </label>
        <button type="submit">Tìm kiếm</button>
    </form>

    <p class="alert success" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <p class="empty-state" th:if="${#lists.isEmpty(courses)}">
        Hiện chưa có lớp học phù hợp với trình độ này
    </p>

    <div class="table-wrap" th:unless="${#lists.isEmpty(courses)}">
        <table>
            <thead>
            <tr>
                <th>Mã khóa</th>
                <th>Tên khóa</th>
                <th>Level</th>
                <th>Học phí</th>
                <th>Khai giảng</th>
                <th>Học viên</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td class="code" th:text="${course.code}"></td>
                <td>
                    <a class="course-name" th:href="@{/course/detail/{code}(code=${course.code})}" th:text="${course.name}"></a>
                    <span class="badge danger" th:if="${course.full}">HẾT CHỖ</span>
                </td>
                <td th:text="${course.level}"></td>
                <td th:text="${#numbers.formatDecimal(course.tuitionFee, 0, 'POINT', 0, 'COMMA') + ' VND'}"></td>
                <td th:text="${course.startDate}"></td>
                <td th:text="${course.studentCount + '/' + course.capacity}"></td>
                <td class="actions">
                    <a class="small-button" th:href="@{/course/edit/{id}(id=${course.id})}">Sửa</a>
                    <form th:action="@{/course/delete/{id}(id=${course.id})}" method="post">
                        <button class="small-button danger-button" type="submit">Hủy khóa học</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <section id="consultation" class="consultation">
        <h2>Đăng ký tư vấn</h2>
        <p>Học vụ sẽ liên hệ để tư vấn lộ trình phù hợp với mục tiêu đầu ra của học viên.</p>
    </section>
</section>
</body>
</html>
